<!DOCTYPE html>
<html>
<head>
  <title>Signup</title>
 
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }
 
    .auth-bg {
      position: relative;
      height: 100vh;
      background: url("/static/Image.jpg") no-repeat center center/cover;
    }
 
    .auth-bg::before {
      content: "";
      position: fixed;  
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }
 
    .auth-bg * {
      position: relative;
      z-index: 1;
    }
 
    .box {
      margin: 180px 500px 0 auto;
      width: 320px;
    }
 
    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
    }
 
    button {
      width: 70%;
      padding: 12px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
 
   
    .message-box {
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
 
    .message-box.error {
      display: block;
      color: #f7f3f3;
      background: rgba(255, 0, 0, 0.1);
      border: 1px solid rgba(255, 0, 0, 0.5);
    }
   
 
.message-box.success {
  color: #00ff85;
  background: rgba(0, 255, 133, 0.1);
  border: 1px solid rgba(0, 255, 133, 0.5);
}
    .message-box.success {
      display: block;
      color: #00ff85;
      background: rgba(0, 255, 133, 0.1);
      border: 1px solid rgba(0, 255, 133, 0.5);
    }
 
    .hint {
      font-size: 12px;
      color: #ccc;
      text-align: left;
      margin-left: 15px;
    }
  </style>
</head>
 
<body class="auth-bg">
 
<div class="box">
  <h2>Signup</h2>
 
  <input type="text" id="email" placeholder="Email">
 
  <input type="password" id="password" placeholder="Password">
 
 
  <div class="hint">
  Password must contain:<br>
  • At least 8 characters<br>
  • At least one uppercase letter (A–Z)<br>
  • At least one lowercase letter (a–z)<br>
  • At least one number (0–9)<br>
  • At least one special character (@, #, $, etc.)
</div>
 
  <button onclick="register()">Register</button>
 
 
  <div id="messageBox" class="message-box"></div>
</div>
 
<script>
 
  document.getElementById("password").addEventListener("input", function() {
    let password = this.value;
    let messageBox = document.getElementById("messageBox");
 
    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}$/;
 
    if (password.length === 0) {
      messageBox.style.display = "none";
      return;
    }
 
    if (!regex.test(password)) {
      messageBox.innerHTML = "⚠ Weak password detected...";
      messageBox.className = "message-box error";
    } else {
      messageBox.innerHTML = "✔ Strong password";
      messageBox.className = "message-box success";
    }
  });
</script>
 
<script src="{{ url_for('static', filename='script.js') }}"></script>
 
</body>
</html>
