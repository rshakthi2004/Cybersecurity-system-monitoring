<!DOCTYPE html>
<html>
<head>
  <title>User Not Found</title>

  <style>
    :root {
      --bg: #0b0f1a;
      --yellow: #ffd000;
      --cyan: #00f5ff;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* Cyber grid */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255,255,0,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,0,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    .card {
      background: rgba(20,25,40,0.7);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid rgba(255,255,0,0.3);
      box-shadow: 0 0 20px rgba(255,255,0,0.3);
    }

    .title {
      color: var(--yellow);
      font-size: 30px;
      text-shadow: 0 0 10px var(--yellow), 0 0 25px var(--yellow);
      margin-bottom: 15px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: var(--yellow);
      border-radius: 50%;
      display: inline-block;
      animation: blink 1s infinite;
    }

    .message {
      color: #fff3a3;
      font-size: 14px;
      margin-bottom: 20px;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    .logs {
      text-align: left;
      margin-top: 20px;
      font-size: 13px;
    }

  </style>
</head>

<body>

  <div class="card">
    <div class="title">
      ⚠ USER NOT FOUND <span class="dot"></span>
    </div>

    <div class="message">
      No account associated with this email.<br>
      Redirecting to registration...
    </div>

    <div class="logs">
      <p style="color:#ffd000;">[SYSTEM] Checking database...</p>
      <p style="color:#fff3a3;">[ERROR] User record not found</p>
      <p style="color:#ffd000;">[ACTION] Redirecting to signup module...</p>
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "/signup";  
    }, 4000);
  </script>

</body>
</html>
