<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
   <style>
    /* GLOBAL STYLES */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: rgb(0, 0, 0);
      text-align: center;
      /* background-color: #0f172a; */
    }

    /* BACKGROUND */
   .auth-bg {
      position: relative;
      margin: 0;
      height: 100vh;
 
      background: url("/static/Image.jpg") no-repeat center center/cover;
    }
 
    /* FULL PAGE FADE*/
    .auth-bg::before {
      content: "";
      position: fixed;  
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
 
      background: rgba(0, 0, 0, 0.6); 
 
      z-index: 0;
    }
 
    /* CONTENT ABOVE OVERLAY */
    .auth-bg * {
      position: relative;
      z-index: 1;
    }
 


    /* LOGIN BOX */
    .box {
      margin: 180px 500px 0 auto;
      width: 320px;
      text-align: center;
      background: none;
      box-shadow: none;
      border: none;
    }

    /* HEADING */
    .box h2 {
      margin-bottom: 30px;
    }

    /* INPUT */
    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    /* BUTTON */
    button {
      width: 70%;
      padding: 12px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: rgb(31, 29, 29);
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.03);
    }

    /* LINKS */
    p {
      margin-top: 12px;
      cursor: pointer;
      color: #fdfdfd;
      font-size: 14px;
      transition: 0.3s;
    }

    p:hover {
      color: #000000;
      text-decoration: underline;
    }
  </style>

</head>
<body class="auth-bg">
 
<div class="box">
  <h2>Reset Password</h2>
  <input type="text" id="email" placeholder="Enter Email">
 
  <button onclick="sendReset()">Send Reset Link</button>
 
  <p onclick="goTo('/')">Back to Login</p>
</div>
 

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
