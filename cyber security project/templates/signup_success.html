<!DOCTYPE html>
<html>
<head>
  <title>Signup Success</title>

  <style>
    :root {
      --bg: #0b0f1a;
      --green: #00ff85;
      --cyan: #00f5ff;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* Cyber grid */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: -1;
    }

    .card {
      background: rgba(20,25,40,0.7);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid rgba(0,255,255,0.2);
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
      animation: fadeIn 1s ease-in-out;
    }

    .success {
      color: var(--green);
      font-size: 28px;
      text-shadow: 0 0 10px var(--green), 0 0 25px var(--green);
      margin-bottom: 15px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      animation: blink 1s infinite;
    }

    .msg {
      color: #ccc;
      margin-bottom: 20px;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="success">
      ✔ ACCOUNT CREATED <span class="dot"></span>
    </div>

    <div class="msg">
      Registration successful.<br>
      Redirecting to login...
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "/";
    }, 3000);  // 3 sec delay
  </script>

</body>
</html>
