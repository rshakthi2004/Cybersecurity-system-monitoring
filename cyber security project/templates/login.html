<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    /* GLOBAL STYLES */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: rgb(247, 240, 240);
      text-align: center;
    }
    /* BACKGROUND */
    .auth-bg {
      position: relative;
      margin: 0;
      height: 100vh;
      background: url("/static/Image.jpg") no-repeat center center/cover;
    }
    .auth-bg::before {
      content: "";
      position: fixed;  
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
 
      background: rgba(0, 0, 0, 0.6);
 
      z-index: 0;
    }
 
    /* CONTENT ABOVE OVERLAY */
    .auth-bg * {
      position: relative;
      z-index: 1;
    }
 
    /* LOGIN BOX */
    .box {
      margin: 180px 500px 0 auto;
      width: 320px;
      text-align: center;
      background: none;
      box-shadow: none;
      border: none;
    }
 
    /* HEADING */
    .box h2 {
      margin-bottom: 30px;
    }
 
    /* INPUT */
    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
      outline: none;
      font-size: 14px;
    }
 
    /* BUTTON */
    button {
      width: 70%;
      padding: 12px;
      margin-top: 10px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: rgb(31, 29, 29);
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }
 
    button:hover {
      background: #16a34a;
      transform: scale(1.03);
    }
 
    /* LINKS */
    p {
      margin-top: 12px;
      cursor: pointer;
      color: #f4f7f8;
      font-size: 14px;
      transition: 0.3s;
    }
 
    p:hover {
      color: #f38181;
      text-decoration: underline;
    }
 
    /* MESSAGE BOX */
    .message-box {
      margin-top: 15px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      transition: all 0.3s ease;
    }
 
    .message-box.success {
      display: block;
      color: #ffffff;
      background: rgba(40, 167, 69, 0.15);
      border: 1px solid rgba(40, 167, 69, 0.4);
      box-shadow: 0 0 8px rgba(247, 140, 0, 0.2);
    }
 
    .message-box.error {
      display: block;
      color: #ffffff;
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.4);
      box-shadow: 0 0 8px rgba(220, 53, 69, 0.2);
    }
 
  </style>
</head>
 
<body class="auth-bg">
 
  <div class="box">
    <h2>Login</h2>
     
    <input type="text" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
 
    <button onclick="login()">Login</button>
 
    <p onclick="goTo('/signup')">Create Account</p>
    <p onclick="goTo('/forgot')">Forgot Password?</p>
  </div>
 
  <div id="loginMessage" class="message-box"></div>
 
  <script src="{{ url_for('static', filename='script.js') }}"></script>
 
</body>
</html>
