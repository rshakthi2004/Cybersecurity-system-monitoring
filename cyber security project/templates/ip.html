<!DOCTYPE html>
<html>
<head>
    <title>Top Attacker IPs</title>
 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #050a14;
            font-family: 'Segoe UI', sans-serif;
            color: #e0f7fa;
        }
 
        h1 {
            text-align: center;
            color: #00ffcc;
        }
 
        .container {
            padding: 20px;
        }
 
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
 
        .card {
            padding: 15px;
            border-radius: 12px;
            background: rgba(10, 15, 28, 0.9);
            border: 1px solid rgba(0,255,204,0.2);
            box-shadow: 0 0 12px rgba(0,255,204,0.15);
        }
 
        .summary {
            text-align: center;
        }
 
        .value {
            font-size: 26px;
            color: #00f5ff;
        }
 
        .sub-text {
            font-size: 12px;
            color: #aaa;
        }
 
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }
 
        table {
            width: 100%;
            border-collapse: collapse;
        }
 
        thead {
            position: sticky;
            top: 0;
            background: #0f172a;
        }
 
        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
 
        th {
            color: #00ffcc;
        }
 
        tbody {
            display: block;
            max-height: 300px;
            overflow-y: auto;
        }
 
        thead, tbody tr {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
 
        .blacklisted {
            color: #ff4444;
            font-weight: bold;
            background: rgba(255,0,0,0.15);
        }
 
        .safe {
            color: #22c55e;
        }
 
        .warning {
            color: #facc15;
        }
 
        .danger {
            color: #ef4444;
        }
 
        .top-attacker {
            border-left: 5px solid #ff0000;
            background: rgba(255,0,0,0.2);
        }
 
        .live-dot {
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }
 
        .status-bar {
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
            color: #aaa;
        }
 
        @keyframes blink {
            50% { opacity: 0.3; }
        }
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            border-bottom: 1px solid #0f2a3a;
        }
    </style>
</head>
 
<body>
    <div class="header">
   
    <h1>🚨 Top Attacker IP Dashboard <span class="live-dot"></span></h1>
    <div onclick="goDashboard()" style="cursor:pointer;background:#00ffcc;color:black;padding:5px 10px;">← Dashboard</div>
</div>
 
 
<div class="container">
 
    <div class="status-bar">
        Last Updated: <span id="lastUpdated" >--</span>
    </div>
 
    <div class="grid">
 
        <!-- LEFT SIDE -->
        <div>
 
            <div class="card summary">
                <h3>Total Attackers</h3>
                <p id="totalAttackers" class="value">0</p>
                <p class="sub-text">Active sources</p>
            </div>
 
            <div class="card summary">
                <h3>Blacklisted IPs</h3>
                <p id="blacklistedCount" class="value">0</p>
                <p class="sub-text">Critical threats</p>
            </div>
 
        </div>
 
        <!-- RIGHT SIDE -->
        <div class="card">
 
            <h3>Attacker List</h3>
 
            <input type="text" id="search" placeholder="Search IP..." onkeyup="filterIPs()">
 
            <table>
                <thead>
                    <tr>
                        <th>IP Address</th>
                        <th>Requests</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="ipTable"></tbody>
            </table>
 
        </div>
 
    </div>
 
</div>
 
<script>
const socket = io();
 
socket.on('attack_update', (data) => {
 
    let table = document.getElementById("ipTable");
    table.innerHTML = "";
 
    let blacklistedCount = 0;
 
    data.forEach(item => {
 
        let status = "🟢 Normal";
        let className = "safe";
 
        if (item.count > 150) {
            status = "🔴 High";
            className = "danger";
        } else if (item.count > 80) {
            status = "🟡 Medium";
            className = "warning";
        }
 
        if (item.blacklisted) {
            status = "🚨 Blacklisted";
            className = "blacklisted";
            blacklistedCount++;
        }
 
        let row = `
            <tr class="${className}">
                <td>${item.ip}</td>
                <td>${item.count}</td>
                <td>${status}</td>
            </tr>
        `;
 
        table.innerHTML += row;
    });
 
    document.getElementById("totalAttackers").innerText = data.length;
    document.getElementById("blacklistedCount").innerText = blacklistedCount;
    document.getElementById("lastUpdated").innerText =
    new Date().toLocaleTimeString();
});
</script>
 
</body>
</html>
